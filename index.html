<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="css/estilos.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego </title>
</head>
<body>
    <button class="iniciar">👌Iniciar Juego</button>
    <section class="contenido">
        <article class="presentacion">
            Nombre
            <input type="text" id="nombre">
            <br>
            <button id="empezar">Empezar Juego</button>
        </article>
        <div id="tiempo"></div>
        <div id="juego">
            Numero 1:
            <input type="number" id="numero1" readonly> <br>
            Numero 2:
            <input type="number" id="numero2" readonly> <br>
            Respuesta:
            <input type="text" id="respuestausuario"> <br>
            <button id="responder">Responder</button>
        </div>
    </section>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="js/funciones.js"></script>
</body>
</html>
